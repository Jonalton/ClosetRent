name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  GCP_REGION: northamerica-northeast2
  IMAGE_NAME: closetrent/backend

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${GCP_PROJECT_ID}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          docker build --platform linux/amd64 -t "$IMAGE_URI" ./backend
          docker push "$IMAGE_URI"
          docker tag "$IMAGE_URI" "${IMAGE_URI%:*}:latest"
          docker push "${IMAGE_URI%:*}:latest"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy closetrent-backend \
            --image "$IMAGE_URI" \
            --region "${{ env.GCP_REGION }}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --quiet

      - name: Run database migrations
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # URL-encode the password so special characters don't break the connection string
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")
          DATABASE_URL="postgresql+asyncpg://closetrent:${ENCODED_PASSWORD}@${DB_HOST}/closetrent"

          gcloud run jobs create closetrent-migrate-${{ github.sha }} \
            --image "$IMAGE_URI" \
            --region "${{ env.GCP_REGION }}" \
            --project "${GCP_PROJECT_ID}" \
            --vpc-connector "closetrent-vpc-connector" \
            --service-account "closetrent-cloud-run@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --command "alembic" \
            --args "upgrade,head" \
            --set-env-vars="DATABASE_URL=${DATABASE_URL},GCP_PROJECT_ID=${GCP_PROJECT_ID},ENVIRONMENT=production,FIREBASE_PROJECT_ID=${GCP_PROJECT_ID},GCS_BUCKET_NAME=closetrent-listing-images,REDIS_URL=redis://localhost:6379,ALGOLIA_APP_ID=,ALGOLIA_API_KEY=,STRIPE_CONNECT_CLIENT_ID=placeholder" \
            --set-secrets="STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest" \
            --execute-now \
            --wait
          gcloud run jobs delete closetrent-migrate-${{ github.sha }} \
            --region "${{ env.GCP_REGION }}" \
            --project "${GCP_PROJECT_ID}" \
            --quiet

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: cd frontend && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          target: closetrent
